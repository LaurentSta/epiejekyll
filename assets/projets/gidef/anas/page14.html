<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Erreur fatale</title>

<style>
  body {
    background: radial-gradient(circle at center, #000000 0%, #050000 100%);
    color: #ddd;
    font-family: "Courier New", monospace;
    text-align: center;
    padding: 60px 20px;
  }

  h1 {
    color: #ff4d4d;
    font-size: 42px;
    text-shadow: 0 0 15px rgba(255,0,0,0.6);
    margin-bottom: 40px;
  }

  p {
    font-size: 18px;
    margin: 10px 0;
    color: #ccc;
  }

  .fatal {
    color: #ff4d4d;
    font-weight: bold;
    text-shadow: 0 0 12px rgba(255,0,0,0.6);
    animation: flicker 1.5s infinite;
  }

  @keyframes flicker {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
  }

  a {
    display: inline-block;
    margin: 20px 10px;
    padding: 12px 16px;
    text-decoration: none;
    border-radius: 5px;
    transition: 0.3s;
    font-weight: bold;
  }

  a:first-of-type {
    color: #ff4d4d;
    border: 1px solid #ff4d4d;
  }

  a:first-of-type:hover {
    background: #ff4d4d;
    color: black;
    box-shadow: 0 0 12px red;
  }

  a:last-of-type {
    color: #9ecbff;
    border: 1px solid #9ecbff;
  }

  a:last-of-type:hover {
    background: #9ecbff;
    color: black;
    box-shadow: 0 0 12px #9ecbff;
  }

  .page-number {
    position: fixed;
    bottom: 15px;
    right: 15px;
    font-size: 14px;
    color: #eee;
    background: rgba(40, 0, 0, 0.8);
    padding: 5px 10px;
    border-radius: 5px;
  }
</style>
</head>

<body>

<h1>Erreur fatale</h1>

<p>Lucas fixe l’écran sans comprendre.</p>

<p>Un dernier message apparaît.</p>

<p class="fatal">"Erreur fatale."</p>

<p>L’image se fige quelques secondes… puis disparaît.</p>

<p>L’écran devient noir.</p>

<p>L’ordinateur ne répond plus.</p>

<p>Plus aucun signe de vie.</p>

<p>Tout est perdu.</p>

<p>Définitivement.</p>

</body>
</html>

      background: rgba(98, 128, 158, 0.685);
      padding: 5px 10px;
      border-radius: 5px;

</html>
