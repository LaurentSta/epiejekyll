---
layout: default
---

<article class="post">
  <header class="post-header">
    <p class="eyebrow">{{ page.date | date: "%d/%m/%Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.authors %}
      <p class="post-meta">Par {{ page.authors | join: ", " }}</p>
    {% elsif page.author %}
      <p class="post-meta">Par {{ page.author }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
